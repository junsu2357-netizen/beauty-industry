<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Industry Analysis Portal</title>
    <style>
        /* 기본 레이아웃 설정 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fcfcfc; /* 아주 연한 배경 */
            color: #222;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* 버튼 컨테이너: 세로로 나열하여 깔끔하게 배치 */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 90%;
            max-width: 450px;
        }

        /* 공통 버튼 스타일 */
        .btn {
            text-decoration: none;
            padding: 14px 20px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.2s ease;
            text-align: center;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
        }

        /* 글로벌 자료 스타일: 네이비 배경 + 흰색 글씨 */
        .btn-global {
            background-color: #001f3f; /* 네이비 */
            color: #ffffff;
            border: 1px solid #001f3f;
        }

        /* 국내 자료 스타일: 연한 초록 배경 + 검은색 글씨 */
        .btn-domestic {
            background-color: #e8f5e9; /* 연한 초록 */
            color: #1b5e20; /* 텍스트는 가독성을 위해 짙은 초록 계열 */
            border: 1px solid #c8e6c9;
        }

        /* 마우스 호버 효과 */
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.08);
            opacity: 0.9;
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>Beauty Industry Analysis</h1>

    <div class="button-container">
        <a href="beauty_industry_analysis.html" class="btn btn-global">
            글로벌 뷰티 (Oxford Economics, Statista 비교)
        </a>

        <a href="McKinsey beauty_industry_analysis.html" class="btn btn-global">
            글로벌 뷰티 산업 분석 (맥킨지 자료)
        </a>

        <a href="kbeauty_industry_analysis.html" class="btn btn-domestic">
            국내 뷰티 (삼일PwC Report)
        </a>
    </div>

</body>
</html>
